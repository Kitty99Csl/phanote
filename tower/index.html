<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phajot Tower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Lao:wght@400;500&family=Noto+Sans+Thai:wght@400;500&display=swap">
    <style>
      html, body { background: #0b1220; color: #e2e8f0; font-family: 'IBM Plex Sans', system-ui, sans-serif; }
      body { min-height: 100vh; }
      * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      .font-mono { font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
      .font-lao { font-family: 'Noto Sans Lao', 'IBM Plex Sans', sans-serif; }
      .font-thai { font-family: 'Noto Sans Thai', 'IBM Plex Sans', sans-serif; }
      .hud-kicker { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
      .hud-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #64748b; }
      .hud-data { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
      /* scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }
      /* focus */
      :focus-visible { outline: 1px solid #f97316; outline-offset: 2px; }
      /* selection */
      ::selection { background: rgba(249, 115, 22, 0.35); color: #fff; }
      /* subtle grid */
      .bg-grid {
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      .scanline {
        position: relative;
      }
      .scanline::after {
        content: '';
        position: absolute; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
      }
      .shimmer {
        background: linear-gradient(90deg, rgba(249,115,22,0) 0%, rgba(249,115,22,0.5) 50%, rgba(249,115,22,0) 100%);
        background-size: 200% 100%;
        animation: shimmer 2.4s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
        50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
      }
      .pulse-dot { animation: pulseGlow 2s ease-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
