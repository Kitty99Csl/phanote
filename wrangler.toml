name = "phanote-parser"
main = "workers/phanote-api-worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.phajot.com/*", zone_name = "phajot.com" },
  { pattern = "api.phanote.com/*", zone_name = "phanote.com" }
]

[placement]
mode = "smart"

[vars]
AI_ENABLED = "true"
ADVISOR_ENABLED = "true"
OCR_ENABLED = "true"
MONTHLY_WRAP_ENABLED = "true"
STATEMENT_ENABLED = "true"
SUPABASE_URL = "https://mmvyipjbufafqfjdcuqj.supabase.co"
